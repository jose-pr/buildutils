name: Docs

# Manual docs build + deploy to GitHub Pages, independent of the release
# pipeline (so the site can be (re)published without cutting a release).
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build documentation site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Install package with docs tooling
        run: python -m pip install -e ".[dev,docs]"
      - name: Build docs
        run: mkdocs build --strict
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    name: Deploy documentation to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
